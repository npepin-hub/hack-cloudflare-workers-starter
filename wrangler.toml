name = "supplier-delay-agent"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "supply-chain-db"
database_id = "YOUR_DB_ID"

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
ESCALATION_THRESHOLD_DAYS = "3"
AUTO_CANCEL_THRESHOLD_DAYS = "14"
